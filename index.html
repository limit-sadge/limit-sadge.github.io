<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>limit_sadge</title>
  <meta
    name="description"
    content="3D visuals, Blender tools, and technical experiments by limit_sadge."
  >

  <style>
    :root {
      --bg: #121212;
      --panel: #1c1c1c;
      --text: #f2f1ed;
      --muted: #a5a5a0;
      --line: #363636;
      --accent: #d8ff59;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(100%, 560px);
    }

    .mark {
      width: 14px;
      height: 14px;
      display: inline-block;
      margin-bottom: 28px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 24px rgba(216, 255, 89, 0.45);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 9vw, 4.6rem);
      line-height: 0.95;
      letter-spacing: -0.07em;
    }

    .intro {
      max-width: 460px;
      margin: 22px 0 38px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.65;
    }

    nav {
      display: grid;
      gap: 10px;
    }

    a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 62px;
      padding: 18px 20px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.16s ease, border-color 0.16s ease;
    }

    a::after {
      content: "↗";
      color: var(--accent);
      font-size: 1.2rem;
    }

    a:hover {
      transform: translateX(5px);
      border-color: var(--accent);
    }

    footer {
      margin-top: 28px;
      color: #777;
      font-size: 0.78rem;
    }
  </style>
</head>

<body>
  <main>
    <span class="mark"></span>

    <h1>limit_sadge</h1>

    <p class="intro">
      3D visuals, Blender tools, and technical experiments.
    </p>

    <nav>
      <a href="SUPERHIVE_URL" target="_blank" rel="noopener noreferrer">
        SuperHive
      </a>

      <a href="ARTSTATION_URL" target="_blank" rel="noopener noreferrer">
        ArtStation
      </a>

      <a href="YOUTUBE_URL" target="_blank" rel="noopener noreferrer">
        YouTube
      </a>

      <a href="BA_COMMUNITY_URL" target="_blank" rel="noopener noreferrer">
        BA Community
      </a>
    </nav>

    <footer>© limit_sadge</footer>
  </main>
</body>
</html>
